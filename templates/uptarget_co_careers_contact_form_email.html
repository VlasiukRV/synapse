<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ form_name }}</title>
</head>
<body style="margin:0; padding:0; background:#f5f5f5; font-family:Montserrat, Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5; padding:40px 0;">
<tr>
<td align="center">

<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-collapse:collapse;">

    <!-- TOP ACCENT -->
    <tr>
        <td style="height:6px; background:#fd0;"></td>
    </tr>

    <!-- HEADER -->
    <tr>
        <td style="padding:30px 40px; text-align:left;">
            <img src="https://uptarget-co.tsb-enterprise.com/img/logo-sign-p-130x130q80.png" alt="Logo" style="height:32px;">
        </td>
    </tr>

    <!-- TITLE -->
    <tr>
        <td style="padding:0 40px;">
            <h2 style="margin:0; font-size:22px; color:#1a1a1c; font-weight:700;">
                New {{ form_name }} Submission
            </h2>
            <p style="margin-top:10px; color:#1a1a1ccc; font-size:14px;">
                You’ve received a new message via Synapse.
            </p>
        </td>
    </tr>

    <!-- DIVIDER -->
    <tr>
        <td style="padding:20px 40px;">
            <hr style="border:none; border-top:1px solid #eeeeee;">
        </td>
    </tr>

    <!-- FIELDS -->
    {% for key, value in data.items() %}
        {% if key != 'confirm_email' %}
        <tr>
            <td style="padding:10px 40px;">
                <div style="font-size:11px; letter-spacing:1px; color:#888; text-transform:uppercase; font-weight:600;">
                    {{ key | replace('_', ' ') }}
                </div>
                <div style="font-size:15px; color:#1a1a1c; margin-top:5px;">
                    {{ value }}
                </div>
            </td>
        </tr>
        {% endif %}
    {% endfor %}

    <!-- CTA -->
    <tr>
        <td style="padding:30px 40px;">
            <a href="mailto:{{ reply_to or 'hello@uptarget.co' }}"
               style="display:inline-block; background:#fd0; color:#1a1a1c; text-decoration:none;
                      padding:14px 24px; font-weight:bold; font-size:13px;
                      text-transform:uppercase; border:2px solid #ffffff;">
                Reply
            </a>
        </td>
    </tr>

    <!-- FOOTER -->
    <tr>
        <td style="padding:20px 40px; font-size:12px; color:#999; border-top:1px solid #eee;">
            © {{ year }} {{ company_name }}<br>
            <span style="color:#1a1a1c80;">Sent via Synapse Engine</span>
        </td>
    </tr>

</table>

</td>
</tr>
</table>

</body>
</html>
